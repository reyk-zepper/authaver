  // ─── KI CENTER ─────────────────────────────────────────────────────────────

  function KICenter() {
    const [expanded, setExpanded] = useState(null);
    return (
      <div className="h-full overflow-y-auto bg-slate-50">
        <div className="max-w-5xl mx-auto px-8 py-8">
          <div className="flex items-center justify-between mb-8"><div><h1 className="text-2xl font-bold text-slate-900">KI-Center</h1><p className="text-slate-500 mt-1 text-sm">5 aktive Agenten · 2 Aktionen heute</p></div><button className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2.5 rounded-xl">+ Neuer Agent</button></div>
          <div className="space-y-3 mb-8">
            {AGENTS.map(a=>(
              <div key={a.id} className={`bg-white rounded-2xl border transition-all ${expanded===a.id?'border-blue-300 shadow-sm':'border-slate-200 hover:border-slate-300'}`}>
                <button onClick={()=>setExpanded(expanded===a.id?null:a.id)} className="w-full text-left px-5 py-4 flex items-center gap-4">
                  <div className="w-10 h-10 bg-slate-100 rounded-2xl flex items-center justify-center text-xl shrink-0">{a.icon}</div>
                  <div className="flex-1 min-w-0"><div className="flex items-center gap-2"><span className="text-sm font-bold text-slate-900">{a.name}</span><span className="text-xs text-slate-400">— {a.role}</span></div><p className="text-xs text-slate-400 mt-0.5">{a.lastAction}</p></div>
                  <div className="flex items-center gap-5 shrink-0">
                    <div><p className="text-xs text-slate-400 mb-1">Token-Budget</p><div className="flex items-center gap-2"><div className="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-blue-500 rounded-full" style={{width:`${a.tokenUsed}%`}}/></div><span className="text-xs text-slate-500 font-medium">{a.tokenUsed}%</span></div></div>
                    <span className={`text-xs font-bold px-3 py-1.5 rounded-full ${a.status==='active'?BC.green:a.status==='alert'?BC.red:BC.slate}`}>{a.status==='active'?'● Aktiv':a.status==='alert'?'⚠ Alert':'⏸ Pause'}</span>
                    <span className="text-xs text-slate-400 w-24 text-right">{a.heartbeat}</span>
                    <svg className={`w-4 h-4 text-slate-400 transition-transform ${expanded===a.id?'rotate-90':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeWidth="2" strokeLinecap="round" d="M9 5l7 7-7 7"/></svg>
                  </div>
                </button>
                {expanded===a.id && (
                  <div className="px-5 pb-5 border-t border-slate-100 pt-4">
                    <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Funktionen & Ablaufschritte</p>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {a.funcs.map((f,i)=><div key={i} className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2"><span className="text-xs font-bold text-blue-500 w-4">{i+1}</span><span className="text-xs text-slate-700">{f}</span></div>)}
                    </div>
                    <div className="flex gap-2"><button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl font-medium">⏸ Pausieren</button><button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl font-medium">📋 Log ansehen</button><button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl font-medium">⚙ Konfigurieren</button></div>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="bg-slate-900 rounded-2xl p-6">
            <div className="flex items-start gap-4 mb-5"><div className="w-10 h-10 bg-slate-700 rounded-2xl flex items-center justify-center text-xl shrink-0">🛠</div><div className="flex-1"><div className="flex items-center gap-2"><p className="text-white font-bold text-sm">Agent-Builder</p><span className="text-xs bg-slate-700 text-slate-400 px-2 py-0.5 rounded-full">Nur Haupteigentümer</span></div><p className="text-slate-400 text-xs mt-0.5">Neuen Agenten aus Vorlage konfigurieren oder von Grund auf anlegen.</p></div></div>
            <div className="grid grid-cols-3 gap-3">
              {[{n:'Wartungsagent',d:'Überwacht Intervalle, erstellt Aufgaben'},{n:'Reporting-Agent',d:'Wöchentliche Zusammenfassungen'},{n:'Kommunikationsagent',d:'Mieter-Korrespondenz verwalten'}].map(t=>(
                <button key={t.n} className="bg-slate-800 hover:bg-slate-700 rounded-xl p-4 text-left border border-slate-700 transition-colors"><p className="text-sm font-semibold text-slate-200">{t.n}</p><p className="text-xs text-slate-500 mt-1">{t.d}</p><span className="inline-block mt-2 text-xs text-blue-400 bg-blue-900/30 px-2 py-0.5 rounded-full">Template</span></button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── APP ───────────────────────────────────────────────────────────────────

  function App() {
    const [view, setView] = useState('dashboard');
    return (
      <div className="flex h-screen overflow-hidden">
        <Sidebar view={view} setView={setView} />
        <main className="flex-1 overflow-hidden">
          {view==='dashboard'      && <Dashboard setView={setView} />}
          {view==='portfolio'      && <Portfolio setView={setView} />}
          {view==='posteingang'    && <Posteingang setView={setView} />}
          {view==='vorgang-detail' && <VorgangDetail setView={setView} />}
          {view==='liegenschaft'   && <LiegenschaftCockpit setView={setView} />}
          {view==='ki-center'      && <KICenter />}
          {view==='finanzen'       && <div className="h-full flex items-center justify-center bg-slate-50"><p className="text-slate-300">Globale Finanzübersicht · in Planung</p></div>}
          {view==='einstellungen'  && <div className="h-full flex items-center justify-center bg-slate-50"><p className="text-slate-300">Einstellungen · in Planung</p></div>}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
