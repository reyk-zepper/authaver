                      lastGroup = item.group;
                      const displayCount = showEmpty ? '0' : item.count;

                      return (
                        <React.Fragment key={item.id}>
                          {showGroupLabel && (
                            <div className="px-3 pt-4 pb-1">
                              <p className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">{NAV_GROUP_LABELS[item.group]}</p>
                            </div>
                          )}
                          <button
                            onClick={() => setNav(item.id)}
                            className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-2xl text-sm transition-all ${
                              nav === item.id ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-50'
                            }`}
                          >
                            <span className="font-medium flex-1 text-left">{item.label}</span>
                            <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${nav === item.id ? 'bg-blue-500 text-white' : 'bg-slate-100 text-slate-500'}`}>{displayCount}</span>
                            <span className={`w-2 h-2 rounded-full shrink-0 ${nav === item.id ? 'bg-white/50' : dotColor}`} />

                <div className="mt-6 rounded-2xl bg-slate-900 p-4">
                  <p className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Qualitaetsziel</p>

                  <button onClick={() => setView('dashboard')} className="mt-4 text-xs bg-white text-slate-900 font-semibold px-3 py-2 rounded-xl">Zurueck zum Dashboard</button>
                </div>
              </div>

              <div className="space-y-4 overflow-y-auto pr-1">

                  <div className="bg-white rounded-3xl border border-slate-200 p-5">
                    <div className="flex items-center justify-between gap-4 mb-4">
                      <div>
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Datenqualitaet</p>
                        <h3 className="text-lg font-bold text-slate-900 mt-1">Offene Punkte mit direktem Fix-Pfad</h3>
                      </div>
                      <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${BADGE_COLORS.amber}`}>4 offen</span>
                    </div>
                    <div className="space-y-3">
                      {STAMMDATEN_ISSUES.map(issue => (
                        <button
                          key={issue.id}
                          onClick={() => selectRecord(issue.navId, issue.recordId)}
                          className="w-full text-left rounded-2xl border border-slate-200 hover:border-blue-300 hover:shadow-sm transition-all px-4 py-4 ring-1 ring-blue-200 ring-offset-2"

                          <div className="flex items-start justify-between gap-4">
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2">
                                <span className={`w-2 h-2 rounded-full shrink-0 ${
                                  issue.severity === 'Hoch' ? 'bg-red-500' : issue.severity === 'Mittel' ? 'bg-amber-500' : 'bg-slate-400'
                                }`} />
                                <p className="text-sm font-semibold text-slate-900">{issue.title}</p>
                                <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${
                                  issue.severity === 'Hoch' ? BADGE_COLORS.red : issue.severity === 'Mittel' ? BADGE_COLORS.amber : BADGE_COLORS.slate

                              </div>
                              <p className="text-xs text-slate-400 mt-1">{issue.entity}</p>
                              {issue.chain && (
                                <div className="mt-2.5 flex flex-wrap items-center gap-1">
                                  {issue.chain.map((step, i) => (
                                    <React.Fragment key={i}>
                                      <span className={`text-xs leading-relaxed ${
                                        i === issue.chain.length - 1
                                          ? (issue.severity === 'Hoch' ? 'font-semibold text-red-600' : 'font-semibold text-amber-600')

                <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden">

                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Explorer</p>

                    <div className="mt-3 flex flex-wrap gap-2">

                  <div className="max-h-[900px] overflow-y-auto">

                        <p className="text-sm text-slate-500 leading-relaxed max-w-xs mx-auto mb-6">Lege dein erstes Objekt an, um Einheiten, Mietverhaeltnisse und Zaehler zu verwalten.</p>

                      </div>
                    ) : records.map(record => (

                          selectedRecord?.id === record.id ? 'bg-blue-50' : 'hover:bg-slate-50'

                      >
                        <div className="flex items-start gap-3">
                          <div className={`w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 ${
                            selectedRecord?.id === record.id ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500'
                          }`}>
                            <span className="text-xs font-bold">{record.name.slice(0, 2).toUpperCase()}</span>
                          </div>
                          <div className="flex-1 min-w-0">

                              <p className="text-sm font-semibold text-slate-900">{record.name}</p>
                              <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${
                                record.statusTone === 'green' ? BADGE_COLORS.green :
                                record.statusTone === 'blue' ? BADGE_COLORS.blue :
                                record.statusTone === 'red' ? BADGE_COLORS.red :
                                record.statusTone === 'amber' ? BADGE_COLORS.amber :
                                BADGE_COLORS.slate
                              }`}>{record.status}</span>
                            </div>
                            <p className="text-xs text-slate-400 mt-1">{record.subtitle}</p>
                            <div className="flex flex-wrap gap-2 mt-3">
                              {record.meta.map(item => (
                                <span key={item} className="text-[11px] font-medium px-2 py-1 rounded-full bg-slate-100 text-slate-600">{item}</span>
                              ))}
                            </div>
                          </div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <div className="space-y-4 overflow-y-auto pr-1">
                {selectedRecord ? (
                <div className="bg-white rounded-3xl border border-slate-200 p-6">
                  <div className="flex items-start justify-between gap-4 mb-4">
                    <div>
                      <div className="flex items-center gap-2 text-xs text-slate-400 mb-2">
                        <span>{selectedRecord.detailType}</span>
                        <span>›</span>
                        <span className="text-slate-600 font-medium">{selectedRecord.name}</span>
                      </div>
                      <h2 className="text-xl font-bold text-slate-900">{selectedRecord.name}</h2>
                      <p className="text-sm text-slate-500 mt-1">{selectedRecord.subtitle}</p>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <span className={`text-xs font-semibold px-3 py-1.5 rounded-full ${
                        selectedRecord.statusTone === 'green' ? BADGE_COLORS.green :
                        selectedRecord.statusTone === 'blue' ? BADGE_COLORS.blue :
                        selectedRecord.statusTone === 'red' ? BADGE_COLORS.red :
                        selectedRecord.statusTone === 'amber' ? BADGE_COLORS.amber :
                        BADGE_COLORS.slate
                      }`}>{selectedRecord.status}</span>
                      <button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl transition-colors font-medium">Bearbeiten</button>
                    </div>
                  </div>

                  {/* Hero Widget — typ-spezifisch */}
                  {selectedRecord.detailType === 'Einheit' && (

                      <div className="flex items-center justify-between mb-2">
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Belegung</p>
                        <span className="text-[10px] text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full font-medium">Hero-Widget v5</span>
                      </div>
                      <div className="flex gap-1 h-8 rounded-lg overflow-hidden">
                        {selectedRecord.id === 'unit-3' && (
                          <>
                            <div className="flex-1 bg-amber-400 rounded-l-lg flex items-center justify-center" title="Belegt · Rueckstand">
                              <span className="text-[10px] font-bold text-amber-900">Belegt · Rueckstand</span>
                            </div>
                          </>
                        )}
                        {selectedRecord.id === 'unit-2' && (
                          <div className="flex-1 bg-green-400 rounded-lg flex items-center justify-center" title="Belegt · bezahlt">
                            <span className="text-[10px] font-bold text-green-900">Belegt · bezahlt</span>
                          </div>
                        )}
                        {selectedRecord.id === 'unit-4' && (
                          <div className="flex-1 bg-slate-200 rounded-lg flex items-center justify-center" title="Leerstand">
                            <span className="text-[10px] font-bold text-slate-500">Leerstand seit 01.04.2026</span>
                          </div>
                        )}
                      </div>
                      <div className="flex items-center gap-4 mt-2">
                        <span className="flex items-center gap-1 text-[10px] text-slate-500"><span className="w-2 h-2 rounded-full bg-green-400" /> Bezahlt</span>
                        <span className="flex items-center gap-1 text-[10px] text-slate-500"><span className="w-2 h-2 rounded-full bg-amber-400" /> Rueckstand</span>
                        <span className="flex items-center gap-1 text-[10px] text-slate-500"><span className="w-2 h-2 rounded-full bg-slate-200" /> Leer</span>
                      </div>
                    </div>
                  )}

                  {selectedRecord.detailType === 'Objekt' && (
                    <div className="bg-slate-50 rounded-xl border border-slate-200 p-4 mb-4 ring-1 ring-blue-200 ring-offset-2">
                      <div className="flex items-center justify-between mb-3">
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Einheiten-Status</p>
                        <span className="text-[10px] text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full font-medium">Hero-Widget v5</span>
                      </div>
                      <div className="grid grid-cols-4 gap-2">
                        {selectedRecord.id === 'obj-1' && [
                          { label: 'Whg 1', status: 'bezahlt', color: 'bg-green-50 border-green-200 text-green-700' },
                          { label: 'Whg 2', status: 'bezahlt', color: 'bg-green-50 border-green-200 text-green-700' },
                          { label: 'Whg 3', status: 'Rueckstand', color: 'bg-amber-50 border-amber-200 text-amber-700' },
                          { label: 'Whg 4', status: 'Leer', color: 'bg-slate-50 border-slate-200 text-slate-500' },
                        ].map(u => (
                          <div key={u.label} className={`rounded-xl border p-2.5 text-center ${u.color}`}>
                            <p className="text-xs font-bold">{u.label}</p>
                            <p className="text-[10px] mt-0.5">{u.status === 'bezahlt' ? '✓' : u.status === 'Leer' ? '○' : '⚠'} {u.status}</p>
                          </div>
                        ))}
                        {selectedRecord.id !== 'obj-1' && (
                          <div className="col-span-4 text-center py-3">
                            <p className="text-xs text-slate-400">Einheiten-Stack fuer weitere Objekte in v6</p>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* Tabs — gefiltert nach Entity-Typ */}
                  <div className="flex border-b border-slate-100 mb-5 overflow-x-auto">
                    {visibleTabs.map(tab => (
                      <button
                        key={tab}
                        onClick={() => setDetailTab(tab)}
                        className={`px-4 py-3 text-sm font-semibold border-b-2 transition-colors ${
                          detailTab === tab ? 'text-blue-600 border-blue-600' : 'text-slate-400 border-transparent hover:text-slate-700'
                        }`}
                      >{tab}</button>
                    ))}
                  </div>

                  {detailTab === 'Stammdaten' && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-4">
                        {Object.entries(selectedRecord.fields).map(([label, value]) => (
                          <div key={label} className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                            <p className="text-xs text-slate-400">{label}</p>
                            <p className="text-sm font-semibold text-slate-900 mt-1">{value}</p>
                          </div>
                        ))}
                      </div>
                      {selectedRecord.id === 'unit-3' && (
                        <div className="ring-1 ring-blue-200 ring-offset-2 rounded-2xl">
                          <div className="flex items-center gap-2 mb-3 px-1">
                            <span className="text-[10px] font-semibold text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full">Edit-Modus</span>
                            <span className="text-[10px] text-slate-400">Statische Demo — in Produktion per Feld umschaltbar</span>
                          </div>
                          <div className="grid grid-cols-2 gap-4">
                            <div className="rounded-2xl border-2 border-blue-400 bg-white px-4 py-4">
                              <p className="text-xs text-blue-500 font-medium mb-2">Notiz / Kommentar</p>
                              <div className="bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-900">Heizung Stoerung gemeldet am 02.04.2026</div>
                              <div className="flex items-center gap-2 mt-3">
                                <button className="text-xs bg-blue-600 text-white font-semibold px-3 py-1.5 rounded-lg">Speichern</button>
                                <button className="text-xs text-slate-500 hover:text-slate-700 font-medium px-3 py-1.5">Abbrechen</button>
                              </div>
                            </div>
                            <div className="rounded-2xl border-2 border-blue-400 bg-white px-4 py-4">
                              <p className="text-xs text-blue-500 font-medium mb-2">Status</p>
                              <div className="bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-900 flex items-center justify-between">
                                <span>Rueckstand</span>
                                <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeWidth="2" strokeLinecap="round" d="M19 9l-7 7-7-7"/></svg>
                              </div>
                              <div className="flex items-center gap-2 mt-3">
                                <button className="text-xs bg-blue-600 text-white font-semibold px-3 py-1.5 rounded-lg">Speichern</button>
                                <button className="text-xs text-slate-500 hover:text-slate-700 font-medium px-3 py-1.5">Abbrechen</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {detailTab === 'Beziehungen' && (
                    <div className="space-y-3">
                      {selectedRecord.relations.map(item => (
                        <div key={item} className="rounded-2xl border border-slate-200 px-4 py-4">
                          <p className="text-sm text-slate-800">{item}</p>
                        </div>
                      ))}
                    </div>
                  )}

                  {detailTab === 'Finanzen' && visibleTabs.includes('Finanzen') && (
                    <div className="space-y-3">
                      {selectedRecord.finance.map(item => (
                        <div key={item} className="rounded-2xl border border-slate-200 px-4 py-4">
                          <p className="text-sm text-slate-800">{item}</p>
                        </div>
                      ))}
                    </div>
                  )}

                  {detailTab === 'Historie' && visibleTabs.includes('Historie') && (
                    <div className="space-y-3">
                      {selectedRecord.timeline.map(item => (
                        <div key={item} className="flex items-start gap-3 rounded-2xl border border-slate-200 px-4 py-4">
                          <span className="w-7 h-7 rounded-full bg-blue-50 text-blue-600 text-xs font-bold flex items-center justify-center shrink-0">•</span>
                          <p className="text-sm text-slate-700">{item}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                ) : (
                  <div className="bg-white rounded-3xl border border-slate-200 p-10 text-center">
                    <div className="text-4xl mb-4">📋</div>
                    <p className="text-slate-400 text-sm">Waehle oder erstelle einen Datensatz</p>
                  </div>
                )}

                {selectedRecord && (
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white rounded-3xl border border-slate-200 p-5">
                    <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Naechste Aktion</p>
                    <p className="text-sm text-slate-800 leading-relaxed">Wenn Datensaetze sauber gepflegt sind, koennen KI und Fachlogik Zuordnungen im Posteingang, in Vorgaengen und in Finanzen direkt weiterverwenden.</p>
                    <button className="mt-4 text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-xl transition-colors font-semibold">Qualitaetsregel pruefen</button>
                  </div>
                  <div className="bg-slate-900 rounded-3xl p-5">
                    <p className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">Abhaengige Module</p>
                    <div className="space-y-2">
                      {['Posteingang nutzt Identitaeten und Einheiten', 'Vorgaenge referenzieren Objekt, Anlage und Person', 'Finanzen brauchen Kostenarten und Vertragsbezug', 'Dokumente haengen an eindeutigen Stammdatenschluesseln'].map(item => (
                        <p key={item} className="text-sm text-slate-200">{item}</p>
                      ))}
                    </div>
                  </div>
                </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── KI CENTER ─────────────────────────────────────────────────────────────

  function KICenter() {
    const [expanded, setExpanded] = useState(null);

    return (
      <div className="h-full overflow-y-auto bg-slate-50">
        <div className="max-w-5xl mx-auto px-8 py-8">

          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">KI-Center</h1>
              <p className="text-slate-500 mt-1 text-sm">5 aktive Funktionen · 2 Aktionen heute · Fokus auf Automationen und Fachprozesse</p>
            </div>
            <button className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2.5 rounded-xl transition-colors">
              + Neue Funktion
            </button>
          </div>

          <div className="grid grid-cols-3 gap-4 mb-6">
            {[
              { label: 'Funktionen aktiv', value: '5', detail: 'Posteingang, Prüfung, Mahnwesen, Archiv, Zahlungsmonitor' },
              { label: 'Automationen mit Freigabe', value: '4', detail: '2 über Schwellwert, 2 vollautomatisch' },
              { label: 'Verarbeitete Aktionen heute', value: '12', detail: 'davon 3 mit Nutzerentscheidung' },
            ].map(card => (
              <div key={card.label} className="bg-white rounded-2xl border border-slate-200 p-5">
                <p className="text-xs text-slate-400">{card.label}</p>
                <p className="text-2xl font-bold text-slate-900 mt-1">{card.value}</p>
                <p className="text-xs text-slate-400 mt-1">{card.detail}</p>
              </div>
            ))}
          </div>

          <div className="space-y-3 mb-8">
            {AGENTS.map(a => (
              <div key={a.id} className={`bg-white rounded-2xl border transition-all ${expanded === a.id ? 'border-blue-300 shadow-sm' : 'border-slate-200 hover:border-slate-300'}`}>
                <button
                  onClick={() => setExpanded(expanded === a.id ? null : a.id)}
                  className="w-full text-left px-5 py-4 flex items-center gap-4"
                >
                  <div className="w-10 h-10 bg-slate-100 rounded-2xl flex items-center justify-center text-xl shrink-0">{a.icon}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-bold text-slate-900">{a.role}</span>
                      <span className="text-xs text-slate-400">· betrieben von {a.name}</span>
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">{a.lastAction}</p>
                  </div>
                  <div className="flex items-center gap-5 shrink-0">
                    <div>
                      <p className="text-xs text-slate-400 mb-1">Auslastung</p>
                      <div className="flex items-center gap-2">
                        <div className="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                          <div className="h-full bg-blue-500 rounded-full" style={{ width: `${a.tokenUsed}%` }} />
                        </div>
                        <span className="text-xs text-slate-500 font-medium">{a.tokenUsed}%</span>
                      </div>
                    </div>
                    <span className={`text-xs font-bold px-3 py-1.5 rounded-full ${
                      a.status === 'active' ? BADGE_COLORS.green :
                      a.status === 'alert'  ? BADGE_COLORS.red :
                      BADGE_COLORS.slate
                    }`}>
                      {a.status === 'active' ? '● Aktiv' : a.status === 'alert' ? '⚠ Alert' : '⏸ Pause'}
                    </span>
                    <span className="text-xs text-slate-400 w-24 text-right">{a.heartbeat}</span>
                    <svg className={`w-4 h-4 text-slate-400 transition-transform ${expanded === a.id ? 'rotate-90' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeWidth="2" strokeLinecap="round" d="M9 5l7 7-7 7"/></svg>
                  </div>
                </button>

                {expanded === a.id && (
                  <div className="px-5 pb-5 border-t border-slate-100 pt-4">
                    <div className="flex items-center justify-between gap-4 mb-3">
                      <div>
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Funktionslogik & Ablaufschritte</p>
                        <p className="text-xs text-slate-400 mt-1">Primäre Funktion: {a.role} · Technische Zuordnung: {a.name}</p>
                      </div>
                      <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-100 text-slate-600">{a.heartbeat}</span>
                    </div>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {a.funcs.map((f, i) => (
                        <div key={i} className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2">
                          <span className="text-xs font-bold text-blue-500 w-4">{i + 1}</span>
                          <span className="text-xs text-slate-700">{f}</span>
                        </div>
                      ))}
                    </div>
                    <div className="flex gap-2">
                      <button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl transition-colors font-medium">Ablauf pausieren</button>
                      <button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl transition-colors font-medium">Funktions-Log ansehen</button>
                      <button className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl transition-colors font-medium">Regeln konfigurieren</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Agent Builder */}
          <div className="bg-slate-900 rounded-2xl p-6">
            <div className="flex items-start gap-4 mb-5">
              <div className="w-10 h-10 bg-slate-700 rounded-2xl flex items-center justify-center text-xl shrink-0">🛠</div>
              <div className="flex-1">
                <div className="flex items-center gap-2">
                  <p className="text-white font-bold text-sm">Funktions-Builder</p>
                  <span className="text-xs bg-slate-700 text-slate-400 px-2 py-0.5 rounded-full">Nur Haupteigentümer</span>
                </div>
                <p className="text-slate-400 text-xs mt-0.5">Neue KI-Funktion aus Vorlage konfigurieren oder vorhandene Automationen fachlich erweitern.</p>
              </div>
            </div>
            <div className="grid grid-cols-3 gap-3">
              {[
                { name: 'Wartungssteuerung', desc: 'Überwacht Intervalle, erstellt Aufgaben und Folgeaufträge' },
                { name: 'Reporting & Kennzahlen', desc: 'Erstellt periodische Übersichten für Portfolio und Führung' },
                { name: 'Kommunikationslogik', desc: 'Erzeugt Antwortentwürfe und priorisiert Rückfragen' },
              ].map(t => (
                <button key={t.name} className="bg-slate-800 hover:bg-slate-700 rounded-xl p-4 text-left border border-slate-700 transition-colors">
                  <p className="text-sm font-semibold text-slate-200">{t.name}</p>
                  <p className="text-xs text-slate-500 mt-1">{t.desc}</p>
                  <span className="inline-block mt-2 text-xs text-blue-400 bg-blue-900/30 px-2 py-0.5 rounded-full">Funktionsvorlage</span>
                </button>
              ))}
            </div>
          </div>

        </div>
      </div>
    );
  }

  // ─── PORTFOLIO ─────────────────────────────────────────────────────────────

  function Portfolio({ setView }) {
    return (
      <div className="h-full overflow-y-auto bg-slate-50">
        <div className="max-w-5xl mx-auto px-8 py-8">
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">Portfolio</h1>
              <p className="text-slate-500 mt-1 text-sm">3 Liegenschaften · 22 Einheiten · 20 belegt · 2 leer</p>
            </div>
            <button className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2.5 rounded-xl transition-colors">
              + Liegenschaft
            </button>
          </div>
          <div className="space-y-4">
            {PROPERTIES.map(p => (
              <button
                key={p.id}
                onClick={() => setView('liegenschaft')}
                className="w-full text-left bg-white border border-slate-200 rounded-2xl p-5 hover:border-blue-300 hover:shadow-sm transition-all group"
              >
                <div className="flex items-center gap-4">
                  <div className="w-11 h-11 bg-blue-50 rounded-2xl flex items-center justify-center text-xl shrink-0 group-hover:bg-blue-100 transition-colors">🏠</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <h3 className="text-sm font-bold text-slate-900 group-hover:text-blue-600 transition-colors">{p.name}</h3>
                      <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${BADGE_COLORS[p.type === 'WEG' ? 'purple' : 'slate']}`}>{p.type}</span>
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">{p.city} · {p.units} Einheiten · {p.occupied} belegt · {p.vacant} leer</p>
                  </div>
                  <div className="flex items-center gap-4 shrink-0">
                    <span className="text-sm font-bold text-slate-900">
                      {p.rent ? `€${p.rent.toLocaleString('de')}/Mo` : `€${p.hausgeld.toLocaleString('de')}/Mo HG`}
                    </span>
                    {p.alerts > 0
                      ? <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${BADGE_COLORS.amber}`}>⚠ {p.alerts} offen</span>
                      : <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${BADGE_COLORS.green}`}>✓ OK</span>
                    }
                  </div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ─── MODULE PAGES ──────────────────────────────────────────────────────────

  function ModulePage({ page, setView, pageKey }) {
    const demoConfig = MODULE_DEMO_CONFIG[pageKey];
    return (
      <div className="h-full overflow-y-auto bg-slate-50">
        <div className="max-w-6xl mx-auto px-8 py-8">
          <div className="flex items-start justify-between gap-6 mb-8">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">{page.title}</h1>
              <p className="text-slate-500 mt-1 text-sm max-w-3xl">{page.subtitle}</p>
            </div>
            <div className="rounded-2xl border border-slate-200 bg-white px-4 py-3 min-w-[220px]">
              <p className="text-xs text-slate-400">Status</p>
              <p className="text-sm font-semibold text-slate-900 mt-1">{page.status}</p>
              <p className="text-xs text-slate-400 mt-2">{page.dependency}</p>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-4 mb-6">
            {page.metrics.map(metric => (
              <div key={metric.label} className="bg-white rounded-2xl border border-slate-200 p-5">
                <p className="text-xs text-slate-400">{metric.label}</p>
                <p className="text-2xl font-bold text-slate-900 mt-1">{metric.value}</p>
                <p className="text-xs text-slate-400 mt-0.5">{metric.detail}</p>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-[1.6fr,1fr] gap-6 mb-6">
            <div className="bg-white rounded-2xl border border-slate-200 p-6">
              <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Funktionslandkarte</p>
              <p className="text-sm text-slate-600 leading-relaxed mb-5">{page.purpose}</p>
              <div className="space-y-4">
                {page.sections.map(section => (
                  <div key={section.group}>
                    <p className="text-sm font-semibold text-slate-900 mb-2">{section.group}</p>
                    <div className="flex flex-wrap gap-2">
                      {section.items.map(item => (
                        <span key={item} className="text-xs font-medium px-3 py-2 rounded-xl bg-slate-50 border border-slate-200 text-slate-700">{item}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="space-y-6">
              <div className="bg-white rounded-2xl border border-slate-200 p-6">
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Zwingende Abhängigkeit</p>
                <p className="text-sm text-slate-700 leading-relaxed">{page.dependency}</p>
              </div>
              <div className="bg-white rounded-2xl border border-slate-200 p-6">
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Leitprozesse</p>
                <div className="space-y-3">
                  {page.flows.map((flow, index) => (
                    <div key={flow} className="flex items-start gap-3">
                      <span className="w-6 h-6 rounded-full bg-blue-50 text-blue-600 text-xs font-bold flex items-center justify-center shrink-0">{index + 1}</span>
                      <p className="text-sm text-slate-700">{flow}</p>
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-slate-900 rounded-2xl p-6">
                <p className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">MVP Einordnung</p>
                <p className="text-sm text-slate-100 leading-relaxed">{page.status}</p>
                <button onClick={() => setView('dashboard')} className="mt-4 text-xs bg-white text-slate-900 font-semibold px-3 py-2 rounded-xl">Zurueck zum Dashboard</button>
              </div>
            </div>
          </div>

          {demoConfig && (
            <div className="bg-white rounded-2xl border border-slate-200 p-6">
              <div className="flex items-start justify-between gap-4 mb-5">
                <div>
                  <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Demo mit lokalem LLM</p>
                  <h3 className="text-lg font-bold text-slate-900">{demoConfig.title}</h3>
                  <p className="text-sm text-slate-500 mt-1">{demoConfig.subtitle}</p>
                </div>
                <span className="text-xs font-medium px-2.5 py-1 rounded-full bg-blue-50 text-blue-600">Demo-Ready</span>
              </div>
              <div className="grid grid-cols-[1.5fr,1fr] gap-6">
                <div className="space-y-3">
                  {demoConfig.stages.map(stage => (
                    <div key={stage.step} className="rounded-2xl border border-slate-200 p-4">
                      <div className="flex items-start gap-3">
                        <span className="w-7 h-7 rounded-full bg-blue-50 text-blue-600 text-xs font-bold flex items-center justify-center shrink-0">{stage.step}</span>
                        <div>
                          <p className="text-sm font-semibold text-slate-900">{stage.name}</p>
                          <p className="text-xs text-slate-500 mt-1">{stage.detail}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-50 rounded-2xl border border-slate-200 p-5">
                  <p className="text-sm font-semibold text-slate-900 mb-3">Demo-Szenarien</p>
                  <div className="space-y-2">
                    {demoConfig.scenarios.map(item => (
                      <div key={item} className="text-xs text-slate-700 bg-white border border-slate-200 rounded-xl px-3 py-2">{item}</div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  function Placeholder({ label }) {
    return (
      <div className="h-full flex items-center justify-center bg-slate-50">
        <p className="text-slate-300 text-sm">{label} · in Planung</p>
      </div>
    );
  }

  // ─── MOCKUP SCAFFOLDING (nur in v5, nicht Teil der App-UI) ──────────────

  function ChangelogHeader({ setView }) {
    const features = [
      { label: 'Impact-Chains', action: () => setView('stammdaten') },
      { label: 'Quality-Dots', action: () => setView('stammdaten') },
      { label: 'Search', action: () => setView('stammdaten') },
      { label: 'Hero-Widget', action: () => setView('stammdaten') },
      { label: 'Inline-Edit', action: () => setView('stammdaten') },
      { label: 'Empty State', action: () => setView('stammdaten') },
    ];
    return (
      <div className="bg-slate-800 text-slate-300 text-xs py-2 px-4 flex items-center gap-3 shrink-0">
        <span className="font-semibold text-slate-100">mockup-v5</span>
        <span className="text-slate-500">Aenderungen:</span>
        {features.map(f => (
          <button key={f.label} onClick={f.action} className="px-2 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white transition-colors font-medium">
            {f.label}
          </button>
        ))}
      </div>
    );
  }

  function DesignNotes() {
    const [open, setOpen] = useState(false);
    const notes = [
      'Impact-Chains: Statisch pro Issue-Typ definiert, nicht dynamisch berechnet.',
      'Smart-Search: 1 vordefinierte Demo-Query ("Mueller"), in Produktion Fuzzy-Search ueber alle Entity-Typen.',
      'Quality-Dots: Farbe = hoechste Issue-Severity des Entity-Typs. Rot = Hoch, Amber = Mittel, Gruen = keine Issues.',
      'Hero-Widget: v5 zeigt Einheit + Objekt. Weitere Typen (Person, Zaehler etc.) folgen in v6.',
      'Inline-Edit: Statischer Zustand bei Whg 3. In Produktion: Field-by-Field Toggle pro Feld.',
    ];
    return (
      <div className="fixed bottom-0 left-0 right-0 z-50">
        {open && (
          <div className="bg-slate-900 border-t border-slate-700 px-6 py-4">
            <div className="max-w-4xl mx-auto space-y-2">
              {notes.map((note, i) => (
                <p key={i} className="text-xs text-slate-400 font-mono leading-relaxed">
                  <span className="text-slate-500 mr-2">{i + 1}.</span>{note}
                </p>
              ))}
            </div>
          </div>
        )}
        <button
          onClick={() => setOpen(!open)}
          className="absolute bottom-0 right-4 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 text-xs font-mono px-3 py-1.5 rounded-t-lg border border-b-0 border-slate-700 transition-colors"
        >
          {open ? '▼ Design Notes' : '▲ Design Notes'}
        </button>
      </div>
    );
  }

  // ─── APP ───────────────────────────────────────────────────────────────────

  function App() {
    const [view, setView] = useState('dashboard');
    return (
      <div className="flex flex-col h-screen overflow-hidden">
        <ChangelogHeader setView={setView} />
        <div className="flex flex-1 overflow-hidden">
          <Sidebar view={view} setView={setView} />
          <main className="flex-1 overflow-hidden">
            {view === 'dashboard'     && <Dashboard setView={setView} />}
            {view === 'metriken'      && <MetricsPage />}
            {view === 'stammdaten'    && <StammdatenWorkspace setView={setView} />}
            {view === 'portfolio'     && <Portfolio setView={setView} />}
            {view === 'posteingang'   && <Posteingang setView={setView} />}
            {view === 'vorgaenge'     && <ModulePage page={MODULE_PAGES.vorgaenge} pageKey="vorgaenge" setView={setView} />}
            {view === 'vorgang-detail'&& <VorgangDetail setView={setView} />}
            {view === 'liegenschaft'  && <LiegenschaftCockpit setView={setView} />}
            {view === 'finanzen'      && <ModulePage page={MODULE_PAGES.finanzen} pageKey="finanzen" setView={setView} />}
            {view === 'abrechnung'    && <ModulePage page={MODULE_PAGES.abrechnung} pageKey="abrechnung" setView={setView} />}
            {view === 'weg'           && <ModulePage page={MODULE_PAGES.weg} pageKey="weg" setView={setView} />}
            {view === 'dokumente'     && <ModulePage page={MODULE_PAGES.dokumente} pageKey="dokumente" setView={setView} />}
            {view === 'ki-center'     && <KICenter />}
            {view === 'einstellungen' && <ModulePage page={MODULE_PAGES.einstellungen} pageKey="einstellungen" setView={setView} />}
          </main>
        </div>
        <DesignNotes />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
